name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: ffdump-linux-x86_64.tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ffdump-windows-x86_64.zip

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ffdump-mac-arm64.tar.gz

          - os: ubuntu-latest
            target: aarch64-linux-android
            artifact: ffdump-android-arm64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install Android NDK linker (Android only)
        if: matrix.target == 'aarch64-linux-android'
        run: |
          sudo apt-get install -y wget unzip
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip -d $HOME
          NDK_BIN=$HOME/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$NDK_BIN/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=$NDK_BIN/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$NDK_BIN/llvm-ar" >> $GITHUB_ENV
          echo "$NDK_BIN" >> $GITHUB_PATH

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/ffdump dist/ffdump
          chmod +x dist/ffdump
          tar -czf ${{ matrix.artifact }} -C dist ffdump

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item target/${{ matrix.target }}/release/ffdump.exe ffdump.exe
          Compress-Archive -Path ffdump.exe -DestinationPath ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "ffdump ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
